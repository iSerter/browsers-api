name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Lightweight CI: unit tests only (no database required).
# The end-to-end suite (`npm run test:e2e`) drives real browsers and a Postgres
# database, so it is run locally during development rather than in CI.
# See docs/DOCKER_TESTING.md for how to run it locally.

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # A couple of unit specs launch a real headless Chromium, so the browser
      # (and its system deps) must be available.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: unit-tests
        continue-on-error: true
