name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT (RELEASE_PLEASE_TOKEN) so the tags/releases this action
          # creates can trigger other workflows. The default GITHUB_TOKEN cannot
          # trigger them. Falls back to GITHUB_TOKEN when the PAT is not set.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
